services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zabir-portfolio
    ports:
      - "8000:80"
    volumes:
      # Persist the SQLite database across container restarts and updates
      - db-data:/var/www/html/database
      # Optional: persist storage uploads if any are added in the future
      - storage-data:/var/www/html/storage/app
    restart: unless-stopped
    env_file:
      - .env

volumes:
  db-data:
  storage-data:
